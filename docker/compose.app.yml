services:
  folderreorg-pipeline:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    image: folderreorg/app:latest
    container_name: folderreorg-pipeline
    working_dir: /app
    command: ["python", "run.py", "--help"]
    environment:
      - RUNPY_REVIEW_URL=${RUNPY_REVIEW_URL:-http://127.0.0.1:8051}
      - RUNPY_NAS_HOST=${RUNPY_NAS_HOST:-mgzh11}
      - RUNPY_NAS_DST_ROOT=${RUNPY_NAS_DST_ROOT:-/volume1/Data_Michael_restructured}
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../source_local:/app/source_local
      - ../target_local:/app/target_local
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    networks:
      - folderreorg-net

  folderreorg-kb:
    image: folderreorg/app:latest
    container_name: folderreorg-kb
    depends_on:
      - qdrant-personal
      - qdrant-360f
    working_dir: /app
    command: ["python", "kb.py", "status"]
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://qdrant-personal:6333}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - KB_VARIANT=${KB_VARIANT:-personal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../source_local:/app/source_local
      - ../target_local:/app/target_local
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    networks:
      - folderreorg-net

  folderreorg-chat-personal:
    image: folderreorg/app:latest
    container_name: folderreorg-chat-personal
    depends_on:
      - qdrant-personal
    working_dir: /app
    command:
      - streamlit
      - run
      - chat_ui/chat_ui.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8502"
      - --server.headless
      - "true"
      - --browser.gatherUsageStats
      - "false"
    environment:
      - KB_VARIANT=personal
      - QDRANT_URL=http://qdrant-personal:6333
      - KB_UI_PORT=8502
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${CHAT_PERSONAL_HOST_PORT:-8052}:8502"
    volumes:
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    networks:
      - folderreorg-net

  folderreorg-chat-360f:
    image: folderreorg/app:latest
    container_name: folderreorg-chat-360f
    depends_on:
      - qdrant-360f
    working_dir: /app
    command:
      - streamlit
      - run
      - chat_ui/chat_ui.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8503"
      - --server.headless
      - "true"
      - --browser.gatherUsageStats
      - "false"
    environment:
      - KB_VARIANT=360f
      - QDRANT_URL=http://qdrant-360f:6333
      - KB_UI_PORT=8503
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${CHAT_360F_HOST_PORT:-8053}:8503"
    volumes:
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    networks:
      - folderreorg-net

  folderreorg-kb-scheduler-personal:
    image: folderreorg/app:latest
    container_name: folderreorg-kb-scheduler-personal
    depends_on:
      - qdrant-personal
    working_dir: /app
    command: ["bash", "docker/kb/run_daily_reindex.sh"]
    environment:
      - KB_VARIANT=personal
      - QDRANT_URL=http://qdrant-personal:6333
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - REINDEX_AT=${KB_REINDEX_PERSONAL_AT:-02:00}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    restart: unless-stopped
    networks:
      - folderreorg-net

  folderreorg-kb-scheduler-360f:
    image: folderreorg/app:latest
    container_name: folderreorg-kb-scheduler-360f
    depends_on:
      - qdrant-360f
    working_dir: /app
    command: ["bash", "docker/kb/run_daily_reindex.sh"]
    environment:
      - KB_VARIANT=360f
      - QDRANT_URL=http://qdrant-360f:6333
      - KB_NAS_MOUNT=${KB_NAS_MOUNT:-/nas}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - REINDEX_AT=${KB_REINDEX_360F_AT:-02:15}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../kb/data:/app/kb/data
      - ${KB_NAS_MOUNT_HOST:-/home/michael.gerber/nas}:/nas:ro
    restart: unless-stopped
    networks:
      - folderreorg-net

  qdrant-personal:
    extends:
      file: ./qdrant/docker-compose.yml
      service: qdrant-personal
    networks:
      - folderreorg-net

  qdrant-360f:
    extends:
      file: ./qdrant/docker-compose.yml
      service: qdrant-360f
    networks:
      - folderreorg-net

networks:
  folderreorg-net:
    driver: bridge
