services:
  # ----------------------------------------------------------------------
  # Personal-data KB (private documents in Data_Michael_restructured/Personal/*)
  # ----------------------------------------------------------------------
  qdrant-personal:
    image: qdrant/qdrant:latest
    container_name: folderreorg-qdrant-personal
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # HTTP API (localhost-only — never LAN)
      - "127.0.0.1:6334:6334"   # gRPC (localhost-only)
    volumes:
      # Persistent data on aizh local SSD; backed up to NAS by separate cron.
      - /home/michael.gerber/folderReorg/qdrant_data_personal:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  # ----------------------------------------------------------------------
  # 360F-business KB (work documents in Data_Michael_restructured/360F/*)
  # ----------------------------------------------------------------------
  qdrant-360f:
    image: qdrant/qdrant:latest
    container_name: folderreorg-qdrant-360f
    restart: unless-stopped
    ports:
      - "127.0.0.1:6433:6333"   # HTTP API on a different host port
      - "127.0.0.1:6434:6334"   # gRPC
    volumes:
      - /home/michael.gerber/folderReorg/qdrant_data_360f:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333    # in-container port stays 6333
      - QDRANT__SERVICE__GRPC_PORT=6334
